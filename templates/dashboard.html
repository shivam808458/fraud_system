{% extends "base.html" %}
{% block content %}

<div class="main">

<h1 style="text-align:center;">📊 ML Analytics Dashboard</h1>

<!-- ===== STATS CARDS ===== -->
<div class="stats-grid">

<div class="card stat-card">
<h3>Total Transactions</h3>
<h2>{{ total }}</h2>
</div>

<div class="card stat-card">
<h3>Fraud Detected</h3>
<h2 style="color:#ef4444;">{{ fraud }}</h2>
</div>

<div class="card stat-card">
<h3>Normal Transactions</h3>
<h2 style="color:#10b981;">{{ normal }}</h2>
</div>

<div class="card stat-card">
<h3>Fraud Rate</h3>
<h2>{{ fraud_percent }}%</h2>
</div>

</div>

<!-- ===== CHARTS ===== -->
<div class="dashboard-grid">

<div class="card">
<h3>Transaction Split</h3>
<div class="chart-box">
<canvas id="splitChart"></canvas>
</div>
</div>

<div class="card">
<h3>Feature Importance (Model Weights)</h3>
<div class="chart-box">
<canvas id="importanceChart"></canvas>
</div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Doughnut Chart
new Chart(splitChart,{
type:'doughnut',
data:{
labels:['Fraud','Normal'],
datasets:[{
data:[{{ fraud }}, {{ normal }}],
backgroundColor:['#ef4444','#10b981']
}]
},
options:{responsive:true,maintainAspectRatio:false}
})

// Feature Importance Chart
new Chart(importanceChart,{
type:'bar',
data:{
labels:['Amount','V1','V2','V3'],
datasets:[{
data:{{ importance }},
backgroundColor:'#8b5cf6'
}]
},
options:{responsive:true,maintainAspectRatio:false}
})

</script>

{% endblock %}
